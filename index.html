<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Flipbook PDF</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/turn.min.js"></script>
<style>
body {
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f0f0f0;
}
#flipbook {
  width: 90%;
  max-width: 872px;
  height: 1220px;
}
.page {
  width: 100%;
  height: 100%;
  background-size: cover;  /* заполняет весь блок */
  background-position: center;
  background-repeat: no-repeat;
  border-radius: 5px;
  box-shadow: 0 0 5px rgba(0,0,0,0.3);
}
</style>
</head>
<body>
<div id="flipbook"></div>

<script>
const images = [
  'images/cover.jpg',  // обложка
  'images/1.jpg',      // страницы контента
  'images/2.jpg',
  'images/3.jpg',
  'images/4.jpg',
  'images/backcover.jpg' // задняя обложка
];

const flipbook = $('#flipbook');

// создаём страницы
images.forEach((img, idx) => {
  const page = $('<div>').addClass('page').css('background-image', `url('${img}')`);
  flipbook.append(page);
});

$(document).ready(function(){
  flipbook.turn({
    width: 872,
    height: 1220,
    autoCenter: true,
    pages: images.length,
    display: 'double',  // открываем по две страницы
    acceleration: true,
    gradients: true,
    elevation: 50
  });
});
</script>
</body>
</html>
