<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Моя Книга</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/turn.min.js"></script>
<style>
body {
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f0f0f0;
}
#flipbook {
  width: 90%;
  max-width: 600px;
  height: 80vh;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  border-radius: 10px;
}
.page {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  border: 1px solid #ccc;
  border-radius: 5px;
}
</style>
</head>
<body>
<div id="flipbook">
  <!-- Страницы подгрузятся автоматически через JS -->
</div>

<script>
// Укажи количество страниц в твоем PDF
const totalPages = 20; // <- замени на своё количество страниц
const flipbook = $('#flipbook');

for (let i = 1; i <= totalPages; i++) {
    const pageDiv = $('<div>').addClass('page').css('background-image', `url('images/${i}.jpg')`);
    flipbook.append(pageDiv);
}

$(document).ready(function(){
  flipbook.turn({
    width: 600,
    height: 800,
    autoCenter: true
  });
});
</script>
</body>
</html>
