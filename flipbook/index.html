<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Flipbook PDF</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/turn.min.js"></script>
<style>
body {
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f0f0f0;
}
#flipbook {
  width: 872px;    /* ширина одной страницы */
  height: 1220px;  /* высота страницы */
}
.page {
  width: 100%;
  height: 100%;
  background-size: cover;  /* изображение растягивается */
  background-position: center;
  background-repeat: no-repeat;
  border-radius: 5px;
  box-shadow: 0 0 5px rgba(0,0,0,0.3);
}
</style>
</head>
<body>
<div id="flipbook"></div>

<script>
// Массив изображений
const images = [
  'images/1.jpg',   // обложка
  'images/2.jpg',
  'images/3.jpg',
  'images/4.jpg',
  'images/5.jpg',
  'images/6.jpg',
  'images/7.jpg',
  'images/8.jpg',
  'images/9.jpg',
  'images/10.jpg',
  'images/11.jpg',
  'images/12.jpg',
  'images/13.jpg',
  'images/14.jpg',
  'images/15.jpg',
  'images/16.jpg',
  'images/17.jpg',
  'images/18.jpg',
  'images/19.jpg',
  'images/20.jpg'  // задняя обложка
];

$(document).ready(function(){
  const flipbook = $('#flipbook');

  // создаём страницы
  images.forEach((img, idx) => {
    const page = $('<div>')
      .addClass('page')
      .css('background-image', `url('${img}')`);
    
    // первая и последняя страницы отдельно (обложки)
    if(idx === 0 || idx === images.length - 1) {
      page.addClass('single');
    } else {
      page.addClass('double');
    }

    flipbook.append(page);
  });

  // инициализация flipbook
  flipbook.turn({
    width: 872,
    height: 1220,
    autoCenter: true,
    pages: images.length,
    display: 'double',  // двойные страницы
    acceleration: true,
    gradients: true,
    elevation: 50,
    when: {
      turning: function(e, page, view) {
        // показываем обложки отдельно
        if(page === 1 || page === images.length) {
          flipbook.turn('display', 'single');
        } else {
          flipbook.turn('display', 'double');
        }
      }
    }
  });
});
</script>
</body>
</html>
