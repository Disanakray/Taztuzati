<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Flipbook PDF</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #f0f0f0;
  }
  #flipbook {
    width: 872px;
    height: 1220px;
  }
  .page {
    width: 100%;
    height: 100%;
    border-radius: 5px;
    box-shadow: 0 0 5px rgba(0,0,0,0.3);
  }
  .single {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .double {
    display: flex;
  }
  .half {
    width: 50%;
    height: 100%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }
  .left { border-right: 1px solid #ccc; }
  .right { border-left: 1px solid #ccc; }
</style>
</head>
<body>
<div id="flipbook"></div>

<script>
const images = [
  'images/1.jpg',   // обложка
  'images/2.jpg',
  'images/3.jpg',
  'images/4.jpg',
  'images/5.jpg',
  'images/6.jpg',
  'images/7.jpg',
  'images/8.jpg',
  'images/9.jpg',
  'images/10.jpg',
  'images/11.jpg',
  'images/12.jpg',
  'images/13.jpg',
  'images/14.jpg',
  'images/15.jpg',
  'images/16.jpg',
  'images/17.jpg',
  'images/18.jpg',
  'images/19.jpg',
  'images/20.jpg'   // задняя обложка
];

$(document).ready(function(){
  const flipbook = $('#flipbook');

  // первая страница - обложка
  flipbook.append(
    $('<div>').addClass('page single').css('background-image', `url('${images[0]}')`)
  );

  // страницы контента по два на разворот
  for(let i = 1; i < images.length - 1; i += 2){
    const left = images[i];
    const right = images[i+1];
    const wrapper = $('<div>').addClass('page double');

    wrapper.append($('<div>').css('background-image', `url('${left}')`).addClass('half left'));
    wrapper.append($('<div>').css('background-image', `url('${right}')`).addClass('half right'));

    flipbook.append(wrapper);
  }

  // последняя страница - задняя обложка
  flipbook.append(
    $('<div>').addClass('page single').css('background-image', `url('${images[images.length-1]}')`)
  );

  flipbook.turn({
    width: 872,
    height: 1220,
    autoCenter: true,
    display: 'double',
    acceleration: true,
    gradients: true,
    elevation: 50
  });
});
</script>
</body>
</html>
