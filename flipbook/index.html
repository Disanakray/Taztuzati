<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Flipbook PDF</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/turn.min.js"></script>
<style>
body {
  margin: 0;
  padding: 0;
  background: #f0f0f0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
#flipbook {
  width: 872px;
  height: 1220px;
}
.page {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 0 5px rgba(0,0,0,0.3);
}
.page.empty {
  background: #f0f0f0;
}
</style>
</head>
<body>

<div id="flipbook"></div>

<script>
const images = [
  'images/1.jpg', // первая обложка
  'images/2.jpg',
  'images/3.jpg',
  'images/4.jpg',
  'images/5.jpg',
  'images/6.jpg',
  'images/7.jpg',
  'images/8.jpg',
  'images/9.jpg',
  'images/10.jpg' // последняя обложка
];

$(document).ready(function(){
  const flipbook = $('#flipbook');

  // добавляем первую обложку как одиночную страницу
  flipbook.append($('<div>').addClass('page').css('background-image', `url('${images[0]}')`));

  // внутренние страницы
  for(let i = 1; i < images.length - 1; i++){
    flipbook.append($('<div>').addClass('page').css('background-image', `url('${images[i]}')`));
  }

  // последняя обложка
  flipbook.append($('<div>').addClass('page').css('background-image', `url('${images[images.length-1]}')`));

  // инициализация flipbook
  flipbook.turn({
    width: 872,
    height: 1220,
    autoCenter: true,
    display: 'double', 
    acceleration: true,
    gradients: true,
    elevation: 50,
    when: {
      turning: function(e, page, view) {
        // если первая или последняя — одиночная
        if(page === 1 || page === images.length) {
          flipbook.turn('display', 'single');
        } else {
          flipbook.turn('display', 'double');
        }
      }
    }
  });
});
</script>

</body>
</html>
