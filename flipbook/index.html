<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Flipbook PDF - single page</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/turn.min.js"></script>
<style>
body {
  margin: 0;
  padding: 0;
  background: #f0f0f0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
#flipbook {
  width: 872px;
  height: 1220px;
  margin-bottom: 10px;
}
.page {
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  box-shadow: 0 0 5px rgba(0,0,0,0.3);
}
button {
  padding: 10px 20px;
  font-size: 18px;
  margin: 5px;
}
</style>
</head>
<body>

<div id="flipbook"></div>
<div>
  <button id="prev">← Назад</button>
  <button id="next">Вперёд →</button>
</div>

<script>
const images = [
  'images/1.jpg',
  'images/2.jpg',
  'images/3.jpg',
  'images/4.jpg',
  'images/5.jpg',
  'images/6.jpg',
  'images/7.jpg',
  'images/8.jpg',
  'images/9.jpg',
  'images/10.jpg',
  'images/11.jpg',
  'images/12.jpg',
  'images/13.jpg',
  'images/14.jpg',
  'images/15.jpg',
  'images/16.jpg',
  'images/17.jpg',
  'images/18.jpg',
  'images/19.jpg',
  'images/20.jpg'
];

$(document).ready(function(){
  const flipbook = $('#flipbook');

  // добавляем страницы
  images.forEach(img => {
    flipbook.append($('<div>').addClass('page').css('background-image', `url('${img}')`));
  });

  // инициализация turn.js
  flipbook.turn({
    width: 872,
    height: 1220,
    autoCenter: true,
    display: 'single', // листание по одной странице
    acceleration: true,
    gradients: true,
    elevation: 50
  });

  // кнопки навигации
  $('#next').click(() => flipbook.turn('next'));
  $('#prev').click(() => flipbook.turn('previous'));
});
</script>

</body>
</html>
